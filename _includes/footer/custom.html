<!-- Visitor badge (counts once per session) -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var span = document.getElementById('visitor-badge');
  if (!span) return;
  var pageId = '{{ site.github_username }}.github.io';
  var counted = sessionStorage.getItem('vc-' + pageId);
  var src = 'https://visitor-badge.laobi.icu/badge?page_id=' + pageId + '&left_color=%23d5d7d7&right_color=%23d5d7d7&left_text=Visitors';
  if (counted) src += '&query_only=true';
  var img = document.createElement('img');
  img.src = src;
  img.alt = 'visitors';
  img.style.cssText = 'vertical-align:middle;height:18px';
  span.appendChild(img);
  if (!counted) sessionStorage.setItem('vc-' + pageId, '1');
});
</script>

<!-- Open external and file links in new tab -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('a[href]').forEach(function(link) {
    var href = link.getAttribute('href');
    /* Skip anchor links, javascript, and navigation */
    if (href.startsWith('#') || href.startsWith('javascript:') || link.closest('.masthead')) return;
    /* File downloads always open in new tab */
    if (/\.(pdf|zip|docx?|pptx?|xlsx?|tar\.gz)$/i.test(href)) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
      return;
    }
    /* External links (different host) open in new tab */
    if (/^https?:\/\//.test(href)) {
      var linkHost = new URL(href, window.location.origin).host;
      if (linkHost !== window.location.host) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    }
  });
});
</script>
